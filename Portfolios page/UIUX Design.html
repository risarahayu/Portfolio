<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <section
          id="portfolios"
          class="row text-center d-flex flex-column gap-3 mt-5"
        >
          <h2 class="fs-5 align-content-center text-center mt-auto">
            Portfolio
          </h2>
          <div class="filter-buttons d-flex gap-3 justify-content-center">
            <!-- <button data-category="All" class="active">All</button> -->
            <button data-category="UI/UX" class="active">UI/UX</button>
            <button data-category="Web">Web</button>
            <button data-category="Digital Marketing">Digital Marketing</button>
          </div>
          <div id="cardContainer" class="row g-3"></div>
        </section>
    </main>
    <!-- boostrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
    <!-- js -->
    <!-- CDN untuk jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="./owl/owl.carousel.min.js"></script>
    <script src="app.js"></script>

    <script>
      let currentIndex = 0;
      const texts = ["Digital Marketer", "UI/UX Designer", "Web Developer"];
      const elements = ["#text1", "#text2", "#text3"];

      function changeText() {
        // Sembunyikan teks yang aktif
        const currentElement = document.querySelector(elements[currentIndex]);
        currentElement.style.display = "none";

        // Hapus class animasi agar dapat di-trigger kembali
        currentElement.classList.remove("animate__fadeInDown");

        // Pindah ke teks berikutnya
        currentIndex = (currentIndex + 1) % texts.length;

        // Tampilkan teks baru
        const nextElement = document.querySelector(elements[currentIndex]);
        nextElement.style.display = "block";

        // Tambahkan kembali class animasi
        nextElement.classList.add("animate__fadeInDown");
      }

      // Mulai rotasi teks setiap 2 detik
      setInterval(changeText, 2000);

      $(function () {
        var owl = $(".owl-carousel");
        owl.owlCarousel({
          items: 1,
          loop: true,
          margin: 10,
          autoplay: true,
          autoplayTimeout: 2000,
        });
        $(".play").on("click", function () {
          owl.trigger("play.owl.autoplay", [1000]);
        });
        $(".stop").on("click", function () {
          owl.trigger("stop.owl.autoplay");
        });
      });
    </script>
</body>
</html>
